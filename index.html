<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matheus - Assistência Técnica</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #003366;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            color: #333;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 450px;
        }
        h2 { text-align: center; color: #003366; margin-top: 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .services {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #eee;
        }
        .option {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .option input { margin-right: 10px; width: 18px; height: 18px; }
        button {
            width: 100%;
            padding: 15px;
            background-color: #fdb913;
            border: none;
            border-radius: 8px;
            color: #003366;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #e5a700; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="container">
    <h2>📱 Orçamento Rápido</h2>
    
    <label>Nome do Cliente:</label>
    <input type="text" id="cliente" placeholder="Seu nome completo">

    <label>Marca do Celular:</label>
    <input type="text" id="marca" placeholder="Ex: Samsung, Apple, Motorola">

    <label>Modelo:</label>
    <input type="text" id="modelo" placeholder="Ex: Galaxy S21, iPhone 11">

    <label>Ano (opcional):</label>
    <input type="text" id="ano" placeholder="Ex: 2021">

    <label>O que você precisa?</label>
    <div class="services">
        <label class="option">
            <input type="checkbox" id="tela"> 🛠️ Troca de Tela
        </label>
        <label class="option">
            <input type="checkbox" id="bateria"> 🔋 Troca de Bateria
        </label>
    </div>

    <button onclick="enviarWhatsApp()">SOLICITAR VIA WHATSAPP</button>
</div>

<script>
    function enviarWhatsApp() {
        const fone = "5511981659701";
        const cliente = document.getElementById('cliente').value;
        const marca = document.getElementById('marca').value;
        const modelo = document.getElementById('modelo').value;
        const ano = document.getElementById('ano').value;
        
        // Verifica serviços selecionados
        let servicos = [];
        if (document.getElementById('tela').checked) servicos.push("Troca de Tela");
        if (document.getElementById('bateria').checked) servicos.push("Troca de Bateria");

        if (cliente === "" || modelo === "" || servicos.length === 0) {
            alert("Por favor, preencha seu nome, o modelo e escolha pelo menos um serviço.");
            return;
        }

        const msgServicos = servicos.join(" e ");
        
        const mensagem = `Olá Matheus! Me chamo *${cliente}* e preciso de um orçamento:%0A%0A` +
                         `*Serviço:* ${msgServicos}%0A` +
                         `*Celular:* ${marca} ${modelo}%0A` +
                         `*Ano:* ${ano || "Não informado"}`;

        const url = `https://wa.me/${fone}?text=${mensagem}`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
